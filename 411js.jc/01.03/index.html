<!DOCTYPE html>

<html lang="ru">
<head>
    <meta charset="utf-8" />
    <title>Подключение через CDN</title>
    <script src="js/jquery-4.0.0.min.js"></script>
    <style>
        #message {
            display: none;
            margin-top: 20px;
            padding: 10px;
            background-color: #f0f0f0;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>
    <button id="showBtn">Показать текст</button>
    <div id="message">
        Привет, я текст, который нужно показать!
    </div>
    <script>
        $(document).ready(function() {
            $('#showBtn').on('click', function() {
                $('#message').fadeIn();
            });
        });
    </script>
</body>
</html>
