<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Локальное подключение jQuery</title>
</head>
<body>
  <h1 id="title">Локальная jQuery</h1>
  <p id="message">Пока библиотека не проверена.</p>
  <button id="testButton">Проверить</button>

  <!--
    Подключаем локальную копию библиотеки из папки js.
    Браузер ищет файл относительно текущего HTML-документа.
  -->
  <script src="js/jquery-4.0.0.min.js"></script>

  <!--
    После загрузки библиотеки подключаем наш код.
  -->
  <script src="js/app.js"></script>
</body>
</html>
