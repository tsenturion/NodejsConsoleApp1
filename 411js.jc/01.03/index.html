<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Подключение jQuery через CDN</title>
</head>
<body>
  <h1 id="title">Подключение jQuery</h1>
  <p class="text">
    Нажмите на кнопку, чтобы проверить, что библиотека подключена и работает.
  </p>

  <button id="checkButton">Проверить jQuery</button>

  <!--
    Сначала подключаем саму библиотеку jQuery.
    Браузер загружает внешний JavaScript-файл и только после этого
    получает доступ к функции $ и объекту jQuery.
  -->
  <script
    src="https://code.jquery.com/jquery-4.0.0.min.js"
    crossorigin="anonymous">
  </script>

  <script>
    /*
      Здесь используется сокращённая форма:
      $(function () { ... });

      Этот код выполняется только после того,
      как браузер построит DOM-структуру страницы.
      То есть все элементы HTML уже существуют,
      и к ним можно безопасно обращаться.
    */
    $(function () {
      // Проверяем, что jQuery действительно подключилась.
      console.log("jQuery загружена:", $);

      /*
        По клику на кнопку запускаем обработчик события.
        Метод .on("click", ...) навешивает реакцию на нажатие.
      */
      $("#checkButton").on("click", function () {
        /*
          Меняем текст заголовка.
          $("#title") выбирает элемент по id="title".
          .text(...) заменяет текст внутри элемента.
        */
        $("#title").text("jQuery подключена успешно");

        /*
          Меняем текст абзаца.
          $(".text") выбирает элемент по классу text.
        */
        $(".text").text("Библиотека работает, DOM найден, обработчик события выполнен.");

        /*
          Дополнительно меняем оформление кнопки,
          чтобы студент видел результат не только в консоли,
          но и прямо на странице.
        */
        $(this).text("Готово");
        $(this).css({
          padding: "10px 16px",
          border: "none",
          cursor: "pointer",
          backgroundColor: "green",
          color: "white"
        });
      });
    });
  </script>
</body>
</html>
