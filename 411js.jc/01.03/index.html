<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>jQuery с отдельным JS-файлом</title>
</head>
<body>
  <h1 id="title">Урок по jQuery</h1>
  <p id="status">Ожидаем загрузку библиотеки...</p>
  <button id="actionButton">Нажми меня</button>

  <!--
    Сначала загружается библиотека jQuery.
    Это обязательно: без неё в app.js символ $ будет неизвестен.
  -->
  <script
    src="https://code.jquery.com/jquery-4.0.0.min.js"
    crossorigin="anonymous">
  </script>

  <!--
    Только после jQuery подключаем наш собственный файл.
    Теперь внутри app.js можно использовать $, jQuery, .ready(), .on() и другие методы.
  -->
  <script src="app.js"></script>
</body>
</html>
