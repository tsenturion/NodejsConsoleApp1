<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Формы и валидация jQuery</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }

    .section {
      margin-bottom: 20px;
    }

    input, select, textarea {
      display: block;
      margin-bottom: 10px;
      padding: 8px;
      width: 300px;
    }

    button {
      padding: 8px 12px;
      cursor: pointer;
    }

    .error {
      border: 2px solid red;
    }

    .error-text {
      color: red;
      font-size: 14px;
      margin-bottom: 10px;
    }

    #result {
      margin-top: 20px;
      padding: 10px;
      border: 1px solid #ccc;
    }

  </style>
</head>
<body>

  <h1>Форма с валидацией</h1>

  <form id="form">

    <div class="section">
      <label>Имя</label>
      <input type="text" id="name">
      <div id="nameError" class="error-text"></div>
    </div>

    <div class="section">
      <label>Email</label>
      <input type="text" id="email">
      <div id="emailError" class="error-text"></div>
    </div>

    <div class="section">
      <label>Сообщение</label>
      <textarea id="message"></textarea>
    </div>

    <div class="section">
      <label>Выберите категорию</label>
      <select id="category">
        <option value="">-- выбрать --</option>
        <option value="support">Поддержка</option>
        <option value="sales">Продажи</option>
      </select>
      <div id="categoryError" class="error-text"></div>
    </div>

    <div class="section">
      <label>Пол</label>
      <input type="radio" name="gender" value="male"> Мужской
      <input type="radio" name="gender" value="female"> Женский
    </div>

    <div class="section">
      <label>
        <input type="checkbox" id="agree"> Согласен с условиями
      </label>
      <div id="agreeError" class="error-text"></div>
    </div>

    <button type="submit">Отправить</button>
    <button type="button" id="resetBtn">Сброс</button>

  </form>

  <div id="result">Результат появится здесь</div>

  <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>
  <script src="app.js"></script>

</body>
</html>
